<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MI NEGRA HERMOSA</title>
  <meta name="language" content="en-US">
  <meta name="title" content="MI NEGRA HERMOSA">
  <meta name="description" content="Collecting this wasn't easy — your star is my motivation to keep going! Contributions are welcome too.">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/love.css">
</head>

<body>
  <audio autoplay loop id="audios" preload="auto">
    <source src="MP3/1.mp3" type="audio/mpeg">
  </audio>

  <div class="container noselect">
    <div class="body_left">
      <img src="images/biubiubiu.gif" alt="Animación" draggable="false">
    </div>

    <div class="body_center love">
      <div class="block">
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
      </div>
    </div>
  </div>

  <div class="footer" aria-hidden="true">
    <div class="border">
      <div class="border-top"></div>
      <div class="border-bottom"></div>
    </div>
  </div>

  <script src="js/love.js"></script>

  <script>
    (function () {
      const audio = document.getElementById('audios');
      function tryPlay() {
        audio.play().catch(() => {});
        window.removeEventListener('click', tryPlay);
        window.removeEventListener('touchstart', tryPlay);
      }
      window.addEventListener('click', tryPlay, { once: true });
      window.addEventListener('touchstart', tryPlay, { once: true });
    })();
  </script>
</body>
</html>
